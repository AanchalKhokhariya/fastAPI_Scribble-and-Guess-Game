<!DOCTYPE html>
<html lang="en">
<head>
    <title>Scribble Game - Join</title>
    <style>
        :root {
            --primary: #ff4757;
            --primary-hover: #ff6b81;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }
        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            color: var(--text);
        }
        .login-card {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 2rem; margin-bottom: 1.5rem; letter-spacing: -0.025em; }
        .name-input { 
            padding: 16px 20px; 
            font-size: 18px; 
            border: 2px solid #334155; 
            border-radius: 12px; 
            margin-bottom: 24px; 
            width: 280px; 
            text-align: center; 
            background: #0f172a;
            color: white;
            outline: none;
            transition: border-color 0.2s;
        }
        .name-input:focus { border-color: var(--primary); }
        .start-btn { 
            padding: 16px 48px; 
            font-size: 20px; 
            font-weight: bold;
            color: white; 
            background-color: var(--primary); 
            border-radius: 12px; 
            border: none; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .start-btn:hover { 
            background-color: var(--primary-hover); 
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(255, 71, 87, 0.4);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🎬 Movie Guess</h1>

        <form action="/join" method="POST">
            <input 
                type="text" 
                name="name" 
                class="name-input" 
                placeholder="Enter Your Name"
                required
            >
            <button type="submit" class="start-btn">START GAME</button>
        </form>

    </div>
</body>
</html>
