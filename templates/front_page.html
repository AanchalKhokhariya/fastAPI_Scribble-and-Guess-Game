<!DOCTYPE html>
<html lang="en">
<head>
    <title>Scribble Game - Join</title>
    <style>
        :root {
            --primary: #ff4757;
            --primary-hover: #ff6b81;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }
        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            color: var(--text);
        }
        .login-card {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 2rem; margin-bottom: 1.5rem; letter-spacing: -0.025em; }
        .name-input { 
            padding: 16px 20px; 
            font-size: 18px; 
            border: 2px solid #334155; 
            border-radius: 12px; 
            margin-bottom: 24px; 
            width: 280px; 
            text-align: center; 
            background: #0f172a;
            color: white;
            outline: none;
            transition: border-color 0.2s;
        }
        .name-input:focus { border-color: var(--primary); }
        .start-btn { 
            padding: 16px 48px; 
            font-size: 20px; 
            font-weight: bold;
            color: white; 
            background-color: var(--primary); 
            border-radius: 12px; 
            border: none; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .start-btn:hover { 
            background-color: var(--primary-hover); 
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(255, 71, 87, 0.4);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🎬 Movie Guess</h1>
        <div id="error-box" style="
            display:none;
            background: rgba(255, 71, 87, 0.15);
            color: #ff6b81;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
        "></div>

        <form action="/join" method="POST" id="gameForm">
            <input type="text" name="name" class="name-input" placeholder="Enter Your Name" required>
            
            <div id="join-section" style="display: none; margin-bottom: 20px;">
                <input type="text" name="room_code" id="roomInput" class="name-input" placeholder="6-Digit Code" maxlength="6">
            </div>

            <input type="hidden" name="action" id="actionInput" value="create">
            <div id="timer-selection" style="margin-bottom: 20px;">
                <label for="duration" style="display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-dim);">
                    Round Duration: <span id="duration-val" style="color: var(--primary); font-weight: bold;">5</span> Minutes
                </label>
                <input type="range" name="duration" id="duration" min="1" max="10" value="5" 
                    style="width: 100%; accent-color: var(--primary);"
                    oninput="document.getElementById('duration-val').innerText = this.value">
            </div>
            <div id="button-container" style="display: flex; gap: 10px; flex-direction: column;">
                <button type="submit" id="submitBtn" class="start-btn">Create Room</button>
                
                <button type="button" id="showJoinBtn" onclick="toggleJoinUI()" class="start-btn" style="background: #334155;">I have a code</button>
            </div>
        </form>
    </div>

<script>
    function toggleJoinUI() {
        document.getElementById('join-section').style.display = 'block';
        document.getElementById('timer-selection').style.display = 'none'; // Hide timer for joiners
        document.getElementById('submitBtn').innerText = 'Join Room';
        document.getElementById('actionInput').value = 'join';
        document.getElementById('showJoinBtn').style.display = 'none';
        document.getElementById('roomInput').required = true;
    }
    function setAction(val) {
        const input = document.getElementById('roomInput');
        if (val === 'create') {
            document.getElementById('actionInput').value = 'create';
            input.required = false;
        }
    }

    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");

    if (error) {
        const errorBox = document.getElementById("error-box");
        errorBox.style.display = "block";

        if (error === "name_taken") {
            errorBox.innerText = "⚠️ Username already exists in this room. Try another name.";
        } 
        else if (error === "not_found") {
            errorBox.innerText = "❌ Room not found. Check your code.";
        } 
        else if (error === "missing_code") {
            errorBox.innerText = "⚠️ Please enter a room code.";
        } 
        else {
            errorBox.innerText = "Something went wrong.";
        }
    }

</script>
</body>
</html>
