<!DOCTYPE html>
<html lang="en">
<head>
    <title>Scribble Game - Join</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #faf8f8; font-family: 'Arial', sans-serif; }
        .name-input { padding: 15px; font-size: 18px; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 20px; width: 250px; text-align: center; }
        .start-btn { padding: 20px 40px; font-size: 24px; color: white; background-color: #ff4757; border-radius: 50px; border: none; cursor: pointer; transition: 0.2s; }
        .start-btn:hover { background-color: #ff6b81; transform: scale(1.1); }
    </style>
</head>
<body>
    <input type="text" id="playerName" class="name-input" placeholder="Enter Your Name">
    <button onclick="startGame()" class="start-btn">START GAME</button>
    <script>
        function startGame() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) { alert("Please enter your name!"); return; }
            window.location.href = `/game?name=${encodeURIComponent(name)}`;
        }
    </script>
</body>
</html>
