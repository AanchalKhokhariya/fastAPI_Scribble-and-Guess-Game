<!DOCTYPE html>
<html>
<head>
    <title>Movie Guessing Game</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background: #fafafa; color: #333; }
        #canvas { border: 2px solid #555; background: #fff; border-radius: 4px; cursor: crosshair; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .toolbar { margin-bottom: 10px; display: flex; justify-content: center; gap: 10px; }
        .btn { padding: 8px 15px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: white; }
        .active-tool { background: #2196F3 !important; color: white; border-color: #1976D2; }
        .btn-clear { background: #ff5252; color: white; border: none; }
        .box-container { margin: 20px auto; display: flex; justify-content: center; flex-wrap: wrap; }
        .letter-input { width: 40px; height: 50px; font-size: 26px; text-align: center; margin: 5px; border: 2px solid #ccc; border-radius: 5px; text-transform: uppercase; }
        .space { width: 30px; }
        #congrats { font-size: 40px; color: #2ecc71; font-weight: bold; margin: 15px; display: none; }
    </style>
</head>
<body>
    <h1>🎬 Movie Guessing Game</h1>
    
    <div id="setup-area">
        <h3 id="role-display">Initializing...</h3>
        <div id="drawer-input" class="hidden">
            <input type="text" id="movieInput" placeholder="Enter movie title...">
            <button class="btn active-tool" onclick="sendMovie()">Start Game</button>
        </div>
    </div>

    <div id="game-area" class="hidden">
        <div id="congrats">🎉 YOU GOT IT RIGHT! 🥳</div>
        <div id="movie-display" class="box-container"></div>
        
        <div id="controls" class="toolbar hidden">
            <button id="drawBtn" class="btn active-tool" onclick="setTool('draw')">✏️ Pencil</button>
            <button id="eraseBtn" class="btn" onclick="setTool('erase')">🧽 Eraser</button>
            <button class="btn btn-clear" onclick="clearCanvasSync()">🗑️ Clear All</button>
        </div>

        <canvas id="canvas" width="800" height="450"></canvas>
    </div>

    <script>
        let ws = new WebSocket("ws://localhost:8000/ws");
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let myRole = "";
        let targetMovie = "";
        let drawing = false;
        let currentTool = "draw";

        ws.onmessage = (event) => {
            let data = JSON.parse(event.data);
            
            if (data.type === "role") {
                myRole = data.role;
                document.getElementById('role-display').innerText = "Role: " + myRole.toUpperCase();
                if (myRole === "drawer") {
                    document.getElementById('drawer-input').classList.remove('hidden');
                    document.getElementById('controls').classList.remove('hidden');
                }
            }
            
            if (data.type === "game_start") {
                targetMovie = data.full_movie;
                document.getElementById('setup-area').classList.add('hidden');
                document.getElementById('game-area').classList.remove('hidden');
                createGuessingBoxes(data.display);
            }

            if (data.type === "drawing" && myRole === "guesser") {
                // If the drawer just started a new click, we MUST begin a new path
                if (data.isNewPath) {
                    ctx.beginPath();
                }
                draw(data.x, data.y, data.tool);
            }

            if (data.type === "clear") {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        };

        function setTool(tool) {
            currentTool = tool;
            document.getElementById('drawBtn').classList.toggle('active-tool', tool === 'draw');
            document.getElementById('eraseBtn').classList.toggle('active-tool', tool === 'erase');
        }

        function clearCanvasSync() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ws.send(JSON.stringify({type: "clear"}));
        }

        function sendMovie() {
            let val = document.getElementById('movieInput').value;
            if(val) ws.send(JSON.stringify({type: "set_movie", movie: val}));
        }

        function createGuessingBoxes(displayStr) {
            let container = document.getElementById('movie-display');
            container.innerHTML = "";
            displayStr.split("").forEach((char, index) => {
                if (char === " ") {
                    let div = document.createElement('div'); div.className = "space"; container.appendChild(div);
                } else {
                    let input = document.createElement('input');
                    input.className = "letter-input";
                    input.maxLength = 1;
                    input.dataset.index = index;
                    if (char !== "_") {
                        input.value = char; input.disabled = true;
                    } else {
                        if (myRole === "drawer") input.disabled = true;
                        input.oninput = () => checkFullWord();
                    }
                    container.appendChild(input);
                }
            });
        }

        function checkFullWord() {
            let inputs = document.querySelectorAll('.letter-input');
            let guessArr = targetMovie.split("").map(c => c === " " ? " " : "");
            inputs.forEach(input => { guessArr[input.dataset.index] = input.value.toUpperCase(); });
            if (guessArr.join("") === targetMovie) {
                document.getElementById('congrats').style.display = "block";
                inputs.forEach(i => i.disabled = true);
            }
        }

        // --- DRAWING LOGIC FIX ---
        canvas.onmousedown = (e) => { 
            if(myRole === "drawer") { 
                drawing = true; 
                ctx.beginPath(); 
                let rect = canvas.getBoundingClientRect();
                let x = e.clientX - rect.left;
                let y = e.clientY - rect.top;
                
                // Send an initial point with isNewPath: true
                ws.send(JSON.stringify({
                    type: "drawing", 
                    x: x, 
                    y: y, 
                    tool: currentTool, 
                    isNewPath: true 
                }));
                draw(x, y, currentTool);
            } 
        };

        canvas.onmouseup = () => { drawing = false; };
        
        canvas.onmousemove = (e) => {
            if (!drawing || myRole !== "drawer") return;
            let rect = canvas.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let y = e.clientY - rect.top;
            
            draw(x, y, currentTool);
            // Send coordinate with isNewPath: false because we are dragging
            ws.send(JSON.stringify({
                type: "drawing", 
                x: x, 
                y: y, 
                tool: currentTool, 
                isNewPath: false 
            }));
        };

        function draw(x, y, tool) {
            ctx.lineWidth = (tool === 'erase') ? 20 : 3;
            ctx.lineCap = "round";
            ctx.lineJoin = "round"; // Smoother corners
            ctx.strokeStyle = (tool === 'erase') ? "#ffffff" : "#333333";
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.moveTo(x, y);
        }
    </script>
</body>
</html>
