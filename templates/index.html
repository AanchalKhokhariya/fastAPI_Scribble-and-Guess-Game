<!DOCTYPE html>
<html>
<head>
    <title>Movie Guessing Game</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background: #fafafa; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 10px; background: white; border-bottom: 1px solid #ddd; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 200px; background: #fff; border-right: 1px solid #ddd; padding: 20px; text-align: left; overflow-y: auto; }
        .player-item { padding: 8px 12px; margin-bottom: 5px; background: #f0f2f5; border-radius: 6px; font-weight: bold; color: #333; }
        .sidebar-title { font-size: 18px; margin-bottom: 15px; border-bottom: 2px solid #ff4757; display: inline-block; }
        #content { flex: 1; padding: 20px; overflow-y: auto; }
        #canvas { border: 2px solid #555; background: #fff; cursor: crosshair; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .toolbar { margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 15px; }
        .btn { padding: 10px 20px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #fff; font-weight: bold; }
        .active-tool { background: #2196F3; color: white; border-color: #2196F3; }
        .box-container { margin: 15px auto; display: flex; justify-content: center; flex-wrap: wrap; }
        .letter-input { width: 40px; height: 50px; font-size: 24px; text-align: center; margin: 3px; border: 2px solid #bbb; border-radius: 6px; text-transform: uppercase; font-weight: bold; }
        .space { width: 30px; }
        #congrats-area { margin: 10px; padding: 15px; background: #e8f5e9; border-radius: 10px; display: none; }
        #congrats-text { font-size: 24px; color: #2ecc71; font-weight: bold; }
        #movie-reveal { font-size: 20px; color: #333; font-weight: bold; margin-bottom: 10px; }
        #status-bar { font-size: 20px; color: #555; margin-bottom: 10px; font-weight: bold; }
        #timer-display { font-size: 22px; color: #ff4757; font-weight: bold; margin-bottom: 10px; }
        .timer-low { color: #eb4d4b !important; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .btn-restart { background: #4CAF50; color: white; border: none; font-size: 16px; padding: 10px 25px; cursor: pointer; border-radius: 50px; }
        #colorPicker { width: 40px; height: 35px; border: none; cursor: pointer; padding: 0; }
    </style>
</head>
<body>
    <header>
        <h1>🎬 Movie Guessing Game</h1>
        <p id="player-welcome" style="margin: 5px 0; color: #666;">Connecting...</p>
    </header>
    <div class="main-container">
        <div id="sidebar">
            <div class="sidebar-title">Players</div>
            <div id="player-list">
            </div>
        </div>
        <div id="content">
            <div id="status-bar"><span id="drawer-status">Connecting...</span></div>
            <div id="timer-display" class="hidden">Time Left: <span id="time-left">05:00</span></div>
            <div id="setup-area">
                <h3 id="role-display">Determining Role...</h3>
                <div id="drawer-input" class="hidden">
                    <input type="text" id="movieInput" placeholder="Enter movie title...">
                    <button class="btn active-tool" onclick="sendMovie()">Start Round</button>
                </div>
            </div>

            <div id="game-area" class="hidden">
                <div id="congrats-area">
                    <div id="congrats-text"></div>
                    <div id="movie-reveal" class="hidden">The movie was: <span id="revealed-name" style="color: #ff4757;"></span></div>
                    <button class="btn-restart" onclick="requestRestart()">Next Round</button>
                </div>
                <div id="movie-display" class="box-container"></div>
                
                <div id="controls" class="toolbar hidden">
                    <button id="drawBtn" class="btn active-tool" onclick="setTool('draw')">✏️ Pencil</button>
                    <button id="eraseBtn" class="btn" onclick="setTool('erase')">🧽 Eraser</button>
                    <input type="color" id="colorPicker" value="#333333" title="Choose color">
                    <button class="btn" onclick="clearCanvasSync()">🗑️ Clear</button>
                </div>
                <canvas id="canvas" width="800" height="450"></canvas>
            </div>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const myName = urlParams.get('name') || "Anonymous";
        document.getElementById('player-welcome').innerText = "Playing as: " + myName;
        let protocol = location.protocol === "https:" ? "wss" : "ws";
        let ws = new WebSocket(`${protocol}://${location.host}/ws/${encodeURIComponent(myName)}`);
        let canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        let myRole = "", targetMovie = "", drawing = false, currentTool = "draw";
        let countdownInterval = null;
        let timeLeft = 300; 
        ws.onmessage = (event) => {
            let data = JSON.parse(event.data);
            if (data.type === "player_list") {
                updatePlayerList(data.players);
            }
            if (data.type === "drawer_disconnected") {
                alert("The Drawer has left the game. Redirecting...");
                window.location.href = "/";
                return;
            }
            if (data.type === "init") {
                myRole = data.role; 
                targetMovie = "";
                stopTimer();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                document.getElementById('congrats-area').style.display = "none";
                document.getElementById('movie-reveal').classList.add('hidden');
                document.getElementById('role-display').innerText = "Your Role: " + myRole.toUpperCase();
                if (myRole === "drawer") {
                    document.getElementById('drawer-input').classList.remove('hidden');
                    document.getElementById('controls').classList.remove('hidden');
                } else {
                    document.getElementById('drawer-input').classList.add('hidden');
                    document.getElementById('controls').classList.add('hidden');
                }
                updateDrawerStatus(data.drawer_name);
                if (data.history) {
                    data.history.forEach(step => {
                        if (step.isNewPath) ctx.beginPath();
                        draw(step.x, step.y, step.tool, step.color);
                    });
                }
                if (data.winner_msg) showAnnouncement(data.winner_msg, data.revealed);
                if (data.movie_set) setupGameUI(data.display, data.full_movie);
                else {
                    document.getElementById('setup-area').classList.remove('hidden');
                    document.getElementById('game-area').classList.add('hidden');
                }
            }            
            if (data.type === "game_start") {
                document.getElementById('congrats-area').style.display = "none";
                document.getElementById('movie-reveal').classList.add('hidden');
                updateDrawerStatus(data.drawer_name);
                setupGameUI(data.display, data.full_movie);
                startTimer(300);
            }
            if (data.type === "announcement") {
                stopTimer();
                showAnnouncement(data.message, data.reveal);
            }
            if (data.type === "drawing" && myRole === "guesser") {
                if (data.isNewPath) ctx.beginPath();
                draw(data.x, data.y, data.tool, data.color);
            }
            if (data.type === "clear") ctx.clearRect(0, 0, canvas.width, canvas.height);
        };
        function updatePlayerList(players) {
            const listContainer = document.getElementById('player-list');
            listContainer.innerHTML = "";
            players.forEach(p => {
                const div = document.createElement('div');
                div.className = "player-item";
                div.innerText = (p === myName) ? p + " (You)" : p;
                listContainer.appendChild(div);
            });
        }
        function startTimer(seconds) {
            stopTimer();
            timeLeft = seconds;
            document.getElementById('timer-display').classList.remove('hidden');
            updateTimerDisplay();
            countdownInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) stopTimer();
                updateTimerDisplay();
            }, 1000);
        }
        function stopTimer() {
            if (countdownInterval) clearInterval(countdownInterval);
            document.getElementById('timer-display').classList.add('hidden');
        }
        function updateTimerDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            const timerSpan = document.getElementById('time-left');
            timerSpan.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            if (timeLeft <= 30) timerSpan.classList.add('timer-low');
            else timerSpan.classList.remove('timer-low');
        }
        function showAnnouncement(msg, reveal) {
            document.getElementById('congrats-text').innerText = msg;
            document.getElementById('congrats-area').style.display = "block";
            if (reveal) {
                document.getElementById('movie-reveal').classList.remove('hidden');
                document.getElementById('revealed-name').innerText = reveal;
            }
            document.querySelectorAll('.letter-input').forEach(i => i.disabled = true);
        }
        function updateDrawerStatus(name) {
            const statusEl = document.getElementById('drawer-status');
            if (!name) return;
            statusEl.innerText = (name === myName) ? "✏️ You are the Drawer!" : `🎨 ${name} is drawing...`;
            statusEl.style.color = (name === myName) ? "#2196F3" : "#555";
        }
        function setupGameUI(display, full) {
            targetMovie = full;
            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            createGuessingBoxes(display);
        }
        function requestRestart() { ws.send(JSON.stringify({type: "restart"})); }
        function sendMovie() {
            let val = document.getElementById('movieInput').value.trim();
            if(val) ws.send(JSON.stringify({type: "set_movie", movie: val}));
        }
        function createGuessingBoxes(displayStr) {
            let container = document.getElementById('movie-display'); 
            container.innerHTML = "";
            displayStr.split("").forEach((char, index) => {
                if (char === " ") {
                    let div = document.createElement('div'); div.className = "space"; container.appendChild(div);
                } else {
                    let input = document.createElement('input');
                    input.className = "letter-input"; input.maxLength = 1; input.dataset.index = index;
                    if (char !== "_") { 
                        input.value = char; input.disabled = true; 
                    } else {
                        if (myRole === "drawer") input.disabled = true;
                        input.oninput = (e) => {
                            let val = e.target.value.toUpperCase();
                            e.target.value = val;
                            if (!val) return;
                            let inputs = Array.from(document.querySelectorAll('.letter-input'));
                            let currentIndex = inputs.indexOf(e.target);
                            for (let i = currentIndex + 1; i < inputs.length; i++) {
                                if (!inputs[i].disabled && inputs[i].value === "") { inputs[i].focus(); break; }
                            }
                            checkFullWord();
                        };
                    }
                    container.appendChild(input);
                }
            });
        }
        function checkFullWord() {
            if (document.getElementById('congrats-area').style.display === "block") return;
            let inputs = document.querySelectorAll('.letter-input');
            let guessArr = targetMovie.split("").map(c => c === " " ? " " : "");
            inputs.forEach(input => { guessArr[input.dataset.index] = input.value.toUpperCase(); });
            if (guessArr.join("") === targetMovie) ws.send(JSON.stringify({type: "won", name: myName}));
        }
        canvas.onmousedown = (e) => { 
            if(myRole === "drawer") { 
                drawing = true; ctx.beginPath(); 
                let rect = canvas.getBoundingClientRect();
                let x = e.clientX - rect.left, y = e.clientY - rect.top;
                let color = document.getElementById('colorPicker').value;
                ws.send(JSON.stringify({type: "drawing", x: x, y: y, tool: currentTool, isNewPath: true, color: color }));
                draw(x, y, currentTool, color);
            } 
        };
        canvas.onmouseup = () => { drawing = false; };
        canvas.onmousemove = (e) => {
            if (!drawing || myRole !== "drawer") return;
            let rect = canvas.getBoundingClientRect();
            let x = e.clientX - rect.left, y = e.clientY - rect.top;
            let color = document.getElementById('colorPicker').value;
            draw(x, y, currentTool, color);
            ws.send(JSON.stringify({type: "drawing", x: x, y: y, tool: currentTool, isNewPath: false, color: color }));
        };        
        function draw(x, y, tool, color) {
            ctx.lineWidth = (tool === 'erase') ? 25 : 4; ctx.lineCap = "round";
            ctx.strokeStyle = (tool === 'erase') ? "#ffffff" : color;
            ctx.lineTo(x, y); ctx.stroke(); ctx.moveTo(x, y);
        }
        function setTool(t) {
            currentTool = t;
            document.getElementById('drawBtn').classList.toggle('active-tool', t === 'draw');
            document.getElementById('eraseBtn').classList.toggle('active-tool', t === 'erase');
        }
        function clearCanvasSync() { 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            ws.send(JSON.stringify({type: "clear"})); 
        }
    </script>
</body>
</html>
