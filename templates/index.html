<!DOCTYPE html>
<html>
<head>
    <title>Movie Guessing Game</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background: #fafafa; }
        #canvas { border: 2px solid #555; background: #fff; cursor: crosshair; }
        .hidden { display: none !important; }
        .toolbar { margin-bottom: 10px; display: flex; justify-content: center; gap: 10px; }
        .btn { padding: 8px 15px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; }
        .active-tool { background: #2196F3; color: white; }
        .box-container { margin: 20px auto; display: flex; justify-content: center; flex-wrap: wrap; }
        .letter-input { width: 40px; height: 50px; font-size: 26px; text-align: center; margin: 5px; border: 2px solid #ccc; border-radius: 5px; text-transform: uppercase; }
        .space { width: 30px; }
        #congrats-area { margin: 20px; display: none; }
        #congrats-text { font-size: 32px; color: #2ecc71; font-weight: bold; }
        .btn-restart { background: #4CAF50; color: white; border: none; font-size: 18px; padding: 10px 25px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1 id="game-title">🎬 Movie Guessing Game</h1>
    <p id="player-welcome"></p>
    
    <div id="setup-area">
        <h3 id="role-display">Joining...</h3>
        <div id="drawer-input" class="hidden">
            <input type="text" id="movieInput" placeholder="Enter movie title...">
            <button class="btn active-tool" onclick="sendMovie()">Start Game</button>
        </div>
    </div>

    <div id="game-area" class="hidden">
        <div id="congrats-area">
            <div id="congrats-text"></div>
            <button class="btn-restart" onclick="requestRestart()">Play Again (New Roles)</button>
        </div>

        <div id="movie-display" class="box-container"></div>
        
        <div id="controls" class="toolbar hidden">
            <button id="drawBtn" class="btn active-tool" onclick="setTool('draw')">✏️ Pencil</button>
            <button id="eraseBtn" class="btn" onclick="setTool('erase')">🧽 Eraser</button>
            <button class="btn" onclick="clearCanvasSync()">🗑️ Clear</button>
        </div>
        <canvas id="canvas" width="800" height="400"></canvas>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const myName = urlParams.get('name') || "Anonymous";
        document.getElementById('player-welcome').innerText = "Playing as: " + myName;

        let protocol = location.protocol === "https:" ? "wss" : "ws";
        let ws = new WebSocket(`${protocol}://${location.host}/ws`);
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let myRole = "";
        let targetMovie = "";
        let drawing = false;
        let currentTool = "draw";

        ws.onmessage = (event) => {
            let data = JSON.parse(event.data);
            
            if (data.type === "init") {
                myRole = data.role;
                targetMovie = "";
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                document.getElementById('congrats-area').style.display = "none";
                document.getElementById('role-display').innerText = "Role: " + myRole.toUpperCase();
                
                if (myRole === "drawer") {
                    document.getElementById('drawer-input').classList.remove('hidden');
                    document.getElementById('controls').classList.remove('hidden');
                } else {
                    document.getElementById('drawer-input').classList.add('hidden');
                    document.getElementById('controls').classList.add('hidden');
                }

                if (data.movie_set) {
                    setupGameUI(data.display, data.full_movie);
                } else {
                    document.getElementById('setup-area').classList.remove('hidden');
                    document.getElementById('game-area').classList.add('hidden');
                }
            }
            
            if (data.type === "game_start") {
                setupGameUI(data.display, data.full_movie);
            }

            if (data.type === "announcement") {
                document.getElementById('congrats-text').innerText = data.message;
                document.getElementById('congrats-area').style.display = "block";
            }

            if (data.type === "drawing" && myRole === "guesser") {
                if (data.isNewPath) ctx.beginPath();
                draw(data.x, data.y, data.tool);
            }

            if (data.type === "clear") {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        };

        function setupGameUI(display, full) {
            targetMovie = full;
            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            createGuessingBoxes(display);
        }

        function requestRestart() {
            ws.send(JSON.stringify({type: "restart"}));
        }

        function sendMovie() {
            let val = document.getElementById('movieInput').value;
            if(val) ws.send(JSON.stringify({type: "set_movie", movie: val}));
        }

        function createGuessingBoxes(displayStr) {
            let container = document.getElementById('movie-display');
            container.innerHTML = "";
            displayStr.split("").forEach((char, index) => {
                if (char === " ") {
                    let div = document.createElement('div'); div.className = "space"; container.appendChild(div);
                } else {
                    let input = document.createElement('input');
                    input.className = "letter-input";
                    input.maxLength = 1;
                    input.dataset.index = index;
                    if (char !== "_") {
                        input.value = char; input.disabled = true;
                    } else {
                        if (myRole === "drawer") input.disabled = true;
                        input.oninput = () => checkFullWord();
                    }
                    container.appendChild(input);
                }
            });
        }

        function checkFullWord() {
            let inputs = document.querySelectorAll('.letter-input');
            let guessArr = targetMovie.split("").map(c => c === " " ? " " : "");
            inputs.forEach(input => { guessArr[input.dataset.index] = input.value.toUpperCase(); });
            if (guessArr.join("") === targetMovie) {
                ws.send(JSON.stringify({type: "won", name: myName}));
                inputs.forEach(i => i.disabled = true);
            }
        }

        canvas.onmousedown = (e) => { 
            if(myRole === "drawer") { 
                drawing = true; ctx.beginPath(); 
                let rect = canvas.getBoundingClientRect();
                let x = e.clientX - rect.left; let y = e.clientY - rect.top;
                ws.send(JSON.stringify({type: "drawing", x: x, y: y, tool: currentTool, isNewPath: true }));
                draw(x, y, currentTool);
            } 
        };
        canvas.onmouseup = () => { drawing = false; };
        canvas.onmousemove = (e) => {
            if (!drawing || myRole !== "drawer") return;
            let rect = canvas.getBoundingClientRect();
            let x = e.clientX - rect.left; let y = e.clientY - rect.top;
            draw(x, y, currentTool);
            ws.send(JSON.stringify({type: "drawing", x: x, y: y, tool: currentTool, isNewPath: false }));
        };
        function draw(x, y, tool) {
            ctx.lineWidth = (tool === 'erase') ? 20 : 3;
            ctx.lineCap = "round";
            ctx.strokeStyle = (tool === 'erase') ? "#ffffff" : "#333333";
            ctx.lineTo(x, y); ctx.stroke(); ctx.moveTo(x, y);
        }
        function setTool(t) {
            currentTool = t;
            document.getElementById('drawBtn').classList.toggle('active-tool', t === 'draw');
            document.getElementById('eraseBtn').classList.toggle('active-tool', t === 'erase');
        }
        function clearCanvasSync() { ctx.clearRect(0, 0, canvas.width, canvas.height); ws.send(JSON.stringify({type: "clear"})); }
    </script>
</body>
</html>
