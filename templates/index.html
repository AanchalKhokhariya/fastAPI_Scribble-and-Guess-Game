<!DOCTYPE html>
<html>
<head>
    <title>Movie Guessing Game</title>
    <style>
        :root {
            --bg: #0f172a;
            --sidebar-bg: #1e293b;
            --accent: #ff4757;
            --accent-soft: rgba(255, 71, 87, 0.1);
            --draw-blue: #3b82f6;
            --success: #22c55e;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            text-align: center; background: var(--bg); color: var(--text-main);
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden;
        }
        header { 
            padding: 10px 20px; background: var(--sidebar-bg); 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .exit-btn {
            background: #4b5563; color: white; border: none; padding: 8px 16px;
            border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s;
        }
        .exit-btn:hover { background: var(--accent); }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid rgba(255,255,255,0.1); padding: 20px; text-align: left; overflow-y: auto; }
        .player-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; margin-bottom: 10px; background: rgba(255,255,255,0.03); border-radius: 12px; }
        .player-score { background: var(--accent); color: white; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .is-me { border: 2px solid var(--draw-blue); background: rgba(59, 130, 246, 0.1); }
        #content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; position: relative; }
        #timer-display { font-size: 20px; color: var(--accent); font-weight: 700; margin-bottom: 15px; background: var(--accent-soft); padding: 8px 20px; border-radius: 30px; border: 1px solid var(--accent); }
        
        /* FIX: White borders for boxes and space for words */
        .letter-input { 
            width: 45px; height: 55px; font-size: 28px; text-align: center; 
            border: 2px solid #ffffff; border-radius: 10px; 
            background: #1e293b; color: white; text-transform: uppercase; font-weight: 800; 
        }
        .space { width: 30px; height: 55px; } 

        #canvas { background: #ffffff; cursor: crosshair; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .toolbar { margin-bottom: 15px; background: var(--sidebar-bg); padding: 10px 20px; border-radius: 12px; display: flex; gap: 10px; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .btn { padding: 8px 16px; cursor: pointer; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: white; font-weight: 600; }
        .active-tool { background: var(--draw-blue); border-color: var(--draw-blue); }
        .box-container { margin: 20px auto; display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; }
        #colorPicker { width: 40px; height: 40px; border: none; border-radius: 8px; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <header>
        <h1>🎬 Movie Guess</h1>
        <div style="display: flex; align-items: center; gap: 15px;">
            <p id="player-welcome" style="margin: 0; color: var(--text-dim);">PLAYER: {{ player_name }}</p>
            <button class="exit-btn" onclick="location.href='/logout'">Exit Game</button>
        </div>
    </header>
    <div class="main-container">
        <div id="sidebar">
            <div id="player-list"></div>
        </div>
        <div id="content">
            <div id="status-bar"><span id="drawer-status">Connecting...</span></div>
            <div id="timer-display" class="hidden">⏱️ <span id="time-left">05:00</span></div>
            <div id="setup-area">
                <h3 id="role-display" style="color: var(--text-dim);">Determining Role...</h3>
                <div id="drawer-input" class="hidden">
                    <input type="text" id="movieInput" placeholder="Enter movie title..." style="padding: 12px; width: 300px; border-radius: 8px; background: #1e293b; color: white;">
                    <button class="btn" onclick="sendMovie()">Start Game</button>
                    <button class="btn" onclick="generateMovie()">🎲 Random</button>
                </div>
            </div>
            <div id="game-area" class="hidden">
                <div id="congrats-area" style="display: none; padding: 15px; background: rgba(34, 197, 94, 0.1); border: 1px solid var(--success); border-radius: 12px;">
                    <div id="congrats-text"></div>
                    <button class="btn" onclick="requestRestart()" style="margin-top: 10px; background: var(--success);">Next Round</button>
                </div>
                <h2 id="drawer-movie" style="color: var(--draw-blue);"></h2>
                <div id="controls" class="toolbar hidden">
                    <button id="drawBtn" class="btn active-tool" onclick="setTool('draw')">✏️ Pencil</button>
                    <button id="eraseBtn" class="btn" onclick="setTool('erase')">🧽 Eraser</button>
                    <input type="color" id="colorPicker" value="#000000">
                    <button class="btn" onclick="clearCanvasSync()">🗑️ Clear</button>
                </div>
                <canvas id="canvas" width="800" height="450"></canvas>
                <div id="movie-display" class="box-container"></div>
            </div>
        </div>
    </div>
    <script>
        const myName = "{{ player_name }}";
        let protocol = window.location.protocol === "https:" ? "wss" : "ws";
        let ws = new WebSocket(`${protocol}://${window.location.host}/ws/${encodeURIComponent(myName)}`);
        let canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        let myRole = "", targetMovie = "", drawing = false, currentTool = "draw", timeLeft = 0, countdownInterval = null;

        ws.onmessage = (event) => {
            let data = JSON.parse(event.data);
            if (data.type === "player_list") updatePlayerList(data.players);
            if (data.type === "init") {
                myRole = data.role;
                document.getElementById('role-display').innerText = "Role: " + myRole.toUpperCase();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                document.getElementById('congrats-area').style.display = "none";
                updateDrawerStatus(data.drawer_name);
                if (data.history) data.history.forEach(step => { if (step.isNewPath) ctx.beginPath(); draw(step.x, step.y, step.tool, step.color); });
                if (data.movie_set) setupGameUI(data.display, data.full_movie);
                else { document.getElementById('setup-area').classList.remove('hidden'); document.getElementById('game-area').classList.add('hidden'); }
                if (myRole === 'drawer') { document.getElementById('drawer-input').classList.remove('hidden'); document.getElementById('controls').classList.remove('hidden'); }
            }
            if (data.type === "game_start") { setupGameUI(data.display, data.full_movie); startTimer(data.time_left); }
            if (data.type === "announcement") showAnnouncement(data.message, data.reveal);
            if (data.type === "drawing" && myRole === "guesser") { if (data.isNewPath) ctx.beginPath(); draw(data.x, data.y, data.tool, data.color); }
            if (data.type === "clear") ctx.clearRect(0, 0, canvas.width, canvas.height);
        };

        function setupGameUI(display, full) {
            targetMovie = full;
            document.getElementById('drawer-movie').innerText = (myRole === "drawer") ? "Draw this: " + full : "";
            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            createGuessingBoxes(display);
        }

        function createGuessingBoxes(displayStr) {
            let container = document.getElementById('movie-display'); container.innerHTML = "";
            displayStr.split("").forEach((char, index) => {
                if (char === " ") { let div = document.createElement('div'); div.className = "space"; container.appendChild(div); }
                else {
                    let input = document.createElement('input'); input.className = "letter-input"; input.maxLength = 1; input.dataset.index = index;
                    if (char !== "_") { input.value = char; input.disabled = true; }
                    else {
                        if (myRole === "drawer") input.disabled = true;
                        input.oninput = (e) => { e.target.value = e.target.value.toUpperCase(); checkFullWord(); };
                    }
                    container.appendChild(input);
                }
            });
        }

        function checkFullWord() {
            let inputs = document.querySelectorAll('.letter-input');
            let guessArr = targetMovie.split("").map(c => c === " " ? " " : "");
            inputs.forEach(input => { guessArr[input.dataset.index] = input.value.toUpperCase(); });
            if (guessArr.join("") === targetMovie) ws.send(JSON.stringify({type: "won", name: myName}));
        }

        canvas.onmousedown = (e) => { 
            if(myRole === "drawer") { 
                drawing = true; ctx.beginPath(); 
                let rect = canvas.getBoundingClientRect();
                let x = e.clientX - rect.left, y = e.clientY - rect.top;
                let color = document.getElementById('colorPicker').value;
                ws.send(JSON.stringify({type: "drawing", x: x, y: y, tool: currentTool, isNewPath: true, color: color }));
                draw(x, y, currentTool, color);
            } 
        };
        canvas.onmouseup = () => { drawing = false; };
        canvas.onmousemove = (e) => {
            if (!drawing || myRole !== "drawer") return;
            let rect = canvas.getBoundingClientRect();
            let x = e.clientX - rect.left, y = e.clientY - rect.top;
            let color = document.getElementById('colorPicker').value;
            draw(x, y, currentTool, color);
            ws.send(JSON.stringify({type: "drawing", x: x, y: y, tool: currentTool, isNewPath: false, color: color }));
        };

        function draw(x, y, tool, color) {
            ctx.lineWidth = (tool === 'erase') ? 25 : 4; ctx.lineCap = "round";
            ctx.strokeStyle = (tool === 'erase') ? "#ffffff" : color;
            ctx.lineTo(x, y); ctx.stroke(); ctx.moveTo(x, y);
        }

        function updatePlayerList(players) {
            const listContainer = document.getElementById('player-list'); listContainer.innerHTML = "";
            players.forEach(p => {
                const div = document.createElement('div'); div.className = "player-item" + (p.name === myName ? " is-me" : "");
                div.innerHTML = `<span class="player-name">${p.name}</span><span class="player-score">${p.score} pts</span>`;
                listContainer.appendChild(div);
            });
        }

        function updateDrawerStatus(name) {
            const statusEl = document.getElementById('drawer-status');
            statusEl.innerText = (name === myName) ? "✏️ YOU are the Drawer!" : `🎨 ${name} is drawing...`;
        }

        function startTimer(seconds) {
            if (countdownInterval) clearInterval(countdownInterval);
            timeLeft = seconds; document.getElementById('timer-display').classList.remove('hidden');
            countdownInterval = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60), secs = timeLeft % 60;
                document.getElementById('time-left').innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) clearInterval(countdownInterval);
            }, 1000);
        }

        function showAnnouncement(msg) { document.getElementById('congrats-text').innerText = msg; document.getElementById('congrats-area').style.display = "block"; }
        function setTool(t) { currentTool = t; document.getElementById('drawBtn').classList.toggle('active-tool', t === 'draw'); document.getElementById('eraseBtn').classList.toggle('active-tool', t === 'erase'); }
        function clearCanvasSync() { ctx.clearRect(0, 0, canvas.width, canvas.height); ws.send(JSON.stringify({type: "clear"})); }
        function sendMovie() { let val = document.getElementById('movieInput').value; if(val) ws.send(JSON.stringify({type: "set_movie", movie: val})); }
        function generateMovie() { ws.send(JSON.stringify({ type: "random_movie" })); }
        function requestRestart() { ws.send(JSON.stringify({type: "restart"})); }
    </script>
</body>
</html>
